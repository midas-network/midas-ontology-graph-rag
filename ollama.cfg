# Ollama Configuration
# This file is loaded by midas-llm to configure the LLM connection.

# Single model (used if OLLAMA_MODELS is not set)
# Options: mistral:7b, llama3.1:8b, qwen2.5:7b, gemma2:9b
OLLAMA_MODEL=mistral:7b

# Multiple models - comma-separated list to run extraction with each
# If set, this overrides OLLAMA_MODEL and runs all models for comparison
# Example: OLLAMA_MODELS=mistral:7b,qwen2.5:7b,llama3.1:8b
OLLAMA_MODELS=mistral:7b,llama3.1:8b,llama3.1:70b

# The Ollama host URL (include http:// prefix)
OLLAMA_HOST=http://gpu-n29:46819


